<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Solaris — Servicios Digitales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Solaris Icon System — SVG sprites compactos -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <!-- Hexágono logo/loader -->
    <symbol id="ico-hex" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
      <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"/>
    </symbol>
    <!-- Carrito -->
    <symbol id="ico-cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </symbol>
    <!-- Configuración / Admin -->
    <symbol id="ico-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </symbol>
    <!-- Saldo / Moneda -->
    <symbol id="ico-wallet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 14a1 1 0 000 2 1 1 0 000-2z" fill="currentColor" stroke="none"/>
      <path d="M22 7V5a2 2 0 00-2-2H4a2 2 0 00-2 2v2"/>
    </symbol>
    <!-- Usuario / Cuenta -->
    <symbol id="ico-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </symbol>
    <!-- Tienda -->
    <symbol id="ico-store" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </symbol>
    <!-- Salir / Logout -->
    <symbol id="ico-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>
    <!-- Carrito vacío (estado empty) -->
    <symbol id="ico-cart-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
      <line x1="9" y1="2" x2="15" y2="2" stroke-dasharray="2 2" opacity=".4"/>
    </symbol>
  </svg>
</head>
<body>

  <!-- ─── LOADER ─────────────────────────────────────────────────── -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-hex">
        <svg width="48" height="48"><use href="#ico-hex"/></svg>
      </div>
      <div class="loader-logo">SOLARIS</div>
      <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>
  </div>

  <!-- ─── APP ───────────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- TOP NAV -->
    <nav id="navbar">
      <div class="nav-logo">
        <svg width="18" height="18"><use href="#ico-hex"/></svg>
        SOLARIS
      </div>
      <div class="nav-actions">
        <div id="nav-balance" class="nav-balance hidden">
          <svg width="14" height="14"><use href="#ico-wallet"/></svg>
          $<span id="balance-amount">0.00</span>
        </div>
        <button id="nav-cart-btn" class="btn-icon hidden">
          <svg width="16" height="16"><use href="#ico-cart"/></svg>
          <span id="cart-count">0</span>
        </button>
        <button id="nav-admin-btn" class="btn-icon hidden" title="Admin">
          <svg width="16" height="16"><use href="#ico-settings"/></svg>
        </button>
        <button id="nav-logout-btn" class="btn-icon hidden">
          <svg width="16" height="16"><use href="#ico-logout"/></svg>
        </button>
      </div>
    </nav>

    <!-- MAIN VIEWS -->
    <main id="main">

      <!-- ── AUTH ──────────────────────────────────────────────── -->
      <div id="view-auth" class="view active">
        <div class="auth-container">
          <div class="auth-hex">
            <svg width="56" height="56"><use href="#ico-hex"/></svg>
          </div>
          <div class="auth-logo">SOLARIS</div>
          <p class="auth-tagline">Tu tienda de servicios digitales</p>

          <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
            <button class="tab-btn" data-tab="register">Registrarse</button>
          </div>

          <div id="tab-login" class="tab-content active">
            <input type="email" id="login-email" placeholder="Correo electrónico" class="input">
            <input type="password" id="login-password" placeholder="Contraseña" class="input">
            <button id="login-btn" class="btn-primary">Entrar</button>
          </div>

          <div id="tab-register" class="tab-content">
            <input type="text" id="reg-name" placeholder="Nombre completo" class="input">
            <input type="email" id="reg-email" placeholder="Correo electrónico" class="input">
            <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" class="input">
            <button id="register-btn" class="btn-primary">Crear cuenta</button>
          </div>

          <div id="auth-msg" class="auth-msg"></div>

          <div class="auth-divider"><span>o continúa con</span></div>
          <button id="google-btn" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continuar con Google
          </button>
        </div>
      </div>

      <!-- ── CATALOG ────────────────────────────────────────────── -->
      <div id="view-catalog" class="view">
        <div class="view-header">
          <h1>Servicios</h1>
          <p>Selecciona el plan que necesitas</p>
        </div>
        <!-- ══ GRILLA DE SERVICIOS ══════════════════════════════
             Para añadir un servicio nuevo, copia un bloque <button class="svc-card">
             y ajusta: data-cat, --svc-color y el SVG interno.
             Luego registra el mismo string en CAT_MAP en script.js
        ═══════════════════════════════════════════════════════ -->
        <div id="cat-grid" class="cat-grid">
          <!-- STREAMING -->
          <button class="svc-card" data-cat="Netflix" style="--svc-color:#141414">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:netflix" style="color:#E50914"></span></span>
            <span class="svc-name">Netflix</span>
          </button>
          <button class="svc-card" data-cat="Vix" style="--svc-color:#0055CC">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:vix" style="color:#ffffff"></span></span>
            <span class="svc-name">Vix Premium</span>
          </button>
          <button class="svc-card" data-cat="HBO" style="--svc-color:#1a0033">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:hbo" style="color:#9900FF"></span></span>
            <span class="svc-name">HBO Max</span>
          </button>
          <button class="svc-card" data-cat="Disney" style="--svc-color:#0C1A6B">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:disneyplus" style="color:#ffffff"></span></span>
            <span class="svc-name">Disney+</span>
          </button>
          <button class="svc-card" data-cat="Paramount" style="--svc-color:#0032A0">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:paramountplus" style="color:#ffffff"></span></span>
            <span class="svc-name">Paramount+</span>
          </button>
          <button class="svc-card" data-cat="PrimeVideo" style="--svc-color:#00253D">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:primevideo" style="color:#00A8E1"></span></span>
            <span class="svc-name">Prime Video</span>
          </button>
          <button class="svc-card" data-cat="Crunchyroll" style="--svc-color:#1a0d00">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:crunchyroll" style="color:#F47521"></span></span>
            <span class="svc-name">Crunchyroll</span>
          </button>
          <button class="svc-card" data-cat="OleadaTV" style="--svc-color:#0d1a2e">
            <span class="svc-logo">
              <svg viewBox="0 0 36 36" width="40" height="40" fill="none">
                <rect x="4" y="8" width="28" height="18" rx="3" stroke="white" stroke-width="2"/>
                <path d="M12 13 Q18 20 24 13" stroke="#F0A500" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <line x1="16" y1="26" x2="20" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="svc-name">Oleada TV</span>
          </button>
          <button class="svc-card" data-cat="UniversalPlus" style="--svc-color:#111">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:universalpictures" style="color:#ffffff"></span></span>
            <span class="svc-name">Universal+</span>
          </button>
          <button class="svc-card" data-cat="Mubi" style="--svc-color:#0E1826">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:mubi" style="color:#ffffff"></span></span>
            <span class="svc-name">Mubi</span>
          </button>
          <button class="svc-card" data-cat="FoxOne" style="--svc-color:#1a0005">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:fox" style="color:#ffffff"></span></span>
            <span class="svc-name">Fox One</span>
          </button>
          <button class="svc-card" data-cat="IPTVSmarters" style="--svc-color:#1a1a1a">
            <span class="svc-logo">
              <svg viewBox="0 0 36 36" width="40" height="40" fill="none">
                <rect x="3" y="7" width="30" height="20" rx="3" stroke="white" stroke-width="2"/>
                <polygon points="14,13 14,21 23,17" fill="white"/>
                <line x1="10" y1="30" x2="26" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="svc-name">IPTV Smarters</span>
          </button>
          <!-- MÚSICA -->
          <button class="svc-card" data-cat="Spotify" style="--svc-color:#0d1f0d">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:spotify" style="color:#1DB954"></span></span>
            <span class="svc-name">Spotify</span>
          </button>
          <button class="svc-card" data-cat="YouTubePremium" style="--svc-color:#1a0000">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:youtube" style="color:#FF0000"></span></span>
            <span class="svc-name">YouTube Premium</span>
          </button>
          <button class="svc-card" data-cat="AmazonMusic" style="--svc-color:#001a21">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:amazonmusic" style="color:#00A8E1"></span></span>
            <span class="svc-name">Amazon Music</span>
          </button>
          <!-- GAMING -->
          <button class="svc-card" data-cat="GamepassCore" style="--svc-color:#0a1a0a">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:xbox" style="color:#107C10"></span></span>
            <span class="svc-name">Gamepass Premium</span>
          </button>
          <button class="svc-card" data-cat="GamepassUlt" style="--svc-color:#061206">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:xbox" style="color:#52B043"></span></span>
            <span class="svc-name">Gamepass Ultimate</span>
          </button>
          <!-- SOFTWARE -->
          <button class="svc-card" data-cat="ChatGPT" style="--svc-color:#0a1f19">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:openai" style="color:#10A37F"></span></span>
            <span class="svc-name">ChatGPT Plus</span>
          </button>
          <button class="svc-card" data-cat="Canva" style="--svc-color:#0d0021">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:canva" style="color:#00C4CC"></span></span>
            <span class="svc-name">Canva Pro</span>
          </button>
          <button class="svc-card" data-cat="Office" style="--svc-color:#2b0d00">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:microsoftoffice" style="color:#D83B01"></span></span>
            <span class="svc-name">Office 365</span>
          </button>
          <button class="svc-card" data-cat="Windows11" style="--svc-color:#001428">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:windows11" style="color:#0078D4"></span></span>
            <span class="svc-name">Windows 11</span>
          </button>
          <button class="svc-card" data-cat="Windows10" style="--svc-color:#001428">
            <span class="svc-logo"><span class="iconify" data-icon="simple-icons:windows" style="color:#0078D4"></span></span>
            <span class="svc-name">Windows 10</span>
          </button>
        </div>
        <!-- Vista: productos del servicio seleccionado -->
        <div id="products-panel" class="products-panel hidden">
          <button id="back-to-cats" class="back-btn">← Servicios</button>
          <div id="products-grid" class="products-grid">
            <div class="loading-state">Cargando productos...</div>
          </div>
        </div>
      </div>

      <!-- ── CART ───────────────────────────────────────────────── -->
      <div id="view-cart" class="view">
        <div class="view-header">
          <h1>Carrito</h1>
        </div>
        <div id="cart-items" class="cart-list"></div>
        <div id="cart-summary" class="cart-summary hidden">
          <div class="summary-row">
            <span>Tu saldo</span>
            <span id="summary-balance" class="summary-val">$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total a pagar</span>
            <span id="summary-total" class="summary-val">$0.00</span>
          </div>
          <div class="summary-row remaining">
            <span>Saldo restante</span>
            <span id="summary-remaining" class="summary-val">$0.00</span>
          </div>
          <button id="checkout-btn" class="btn-primary">Confirmar compra</button>
        </div>
        <div id="cart-empty" class="empty-state hidden">
          <div class="empty-icon">
            <svg width="48" height="48"><use href="#ico-cart-empty"/></svg>
          </div>
          <p>Tu carrito está vacío</p>
          <button class="btn-secondary" onclick="showView('catalog')">Ver productos</button>
        </div>
      </div>

      <!-- ── ADMIN ──────────────────────────────────────────────── -->
      <div id="view-admin" class="view">
        <div class="view-header">
          <h1>Panel Admin</h1>
        </div>
        <div class="admin-tabs">
          <button class="tab-btn active" data-admin-tab="products">Productos</button>
          <button class="tab-btn" data-admin-tab="users">Usuarios</button>
          <button class="tab-btn" data-admin-tab="add">+ Agregar</button>
        </div>

        <div id="admin-tab-products" class="admin-tab active">
          <div id="admin-products-list" class="admin-list">
            <div class="loading-state">Cargando...</div>
          </div>
        </div>

        <div id="admin-tab-users" class="admin-tab">
          <div id="admin-users-list" class="admin-list">
            <div class="loading-state">Cargando...</div>
          </div>
        </div>

        <div id="admin-tab-add" class="admin-tab">
          <div class="admin-form">
            <input type="text" id="ap-name" placeholder="Nombre del producto" class="input">
            <select id="ap-category" class="input">
              <option value="">Categoría...</option>
              <option value="Netflix">Netflix</option>
              <option value="HBO">HBO</option>
              <option value="Spotify">Spotify</option>
              <option value="Internet">Internet</option>
              <option value="Office">Office</option>
              <option value="VPN">VPN</option>
              <option value="Otro">Otro</option>
            </select>
            <input type="text" id="ap-desc" placeholder="Descripción breve" class="input">
            <div class="input-row">
              <input type="number" id="ap-price" placeholder="Precio (USD)" class="input" step="0.01" min="0.01">
              <input type="number" id="ap-duration" placeholder="Días" class="input" value="30" min="1">
            </div>
            <textarea id="ap-account" placeholder="Datos de cuenta (usuario:contraseña)" class="input" rows="3"></textarea>
            <button id="add-product-btn" class="btn-primary">Agregar Producto</button>
            <div id="ap-msg" class="auth-msg"></div>
          </div>
        </div>
      </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav" class="hidden">
      <button class="bottom-btn" data-view="catalog">
        <span class="bottom-icon">
          <svg width="22" height="22"><use href="#ico-store"/></svg>
        </span>
        <small>Tienda</small>
      </button>
      <button class="bottom-btn" data-view="cart">
        <span class="bottom-icon">
          <svg width="22" height="22"><use href="#ico-cart"/></svg>
        </span>
        <small>Carrito</small>
      </button>
      <button class="bottom-btn" id="account-btn">
        <span class="bottom-icon">
          <svg width="22" height="22"><use href="#ico-user"/></svg>
        </span>
        <small>Cuenta</small>
      </button>
    </nav>

  </div><!-- /app -->

  <!-- ─── MODAL ──────────────────────────────────────────────────── -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div id="modal-content"></div>
      <button id="modal-close" class="btn-secondary" style="width:100%;margin-top:4px">Cerrar</button>
    </div>
  </div>

  <!-- ─── TOAST ─────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─── GOOGLE ONE TAP ───────────────────────────────────────── -->
  <!-- ⚠️ Reemplaza GOOGLE_CLIENT_ID_PLACEHOLDER con tu Client ID de Google Cloud Console -->
  <div id="g_id_onload"
    data-client_id="243529116303-r4t75out47hhph4ku94bmh9mmmlrbn8b.apps.googleusercontent.com"
    data-context="signin"
    data-ux_mode="popup"
    data-callback="handleOneTap"
    data-auto_select="true"
    data-itp_support="true">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
